name: Build WatchGuard T30 FAST-STRIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: 'dmascord/openwrt'
          ref: 'add-watchguard-t30-w'

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev swig \
            python3-dev python3-setuptools

      - name: Update and Install Feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Strip All Devices Except T30
        run: |
          # Διαγράφουμε τα πάντα και κρατάμε μόνο το T30 για ταχύτητα
          printf "include \$(INCLUDE_DIR)/image.mk\n\n" > target/linux/mpc85xx/image/p1020.mk
          cat <<'EOF' >> target/linux/mpc85xx/image/p1020.mk
          define Device/watchguard_firebox-t30
            DEVICE_VENDOR := WatchGuard
            DEVICE_MODEL := Firebox T30
            DEVICE_VARIANT := T30-W
            BOARD_NAME := watchguard,firebox-t30
            DEVICE_DTS := watchguard-firebox-t30
            KERNEL := append-dtb | pad-to 64k | lzma
            DEVICE_PACKAGES := kmod-usb-storage kmod-fs-ext4 kmod-usb-ohci kmod-usb2 kmod-usb3
            IMAGES := factory.img.gz
            IMAGE/factory.img.gz := append-kernel | pad-to 128k | append-rootfs | pad-rootfs | check-size
          endef
          TARGET_DEVICES += watchguard_firebox-t30
          $(eval $(call BuildImage))
          EOF

      - name: Minimal Configure and Build
        run: |
          echo "CONFIG_TARGET_mpc85xx=y" > .config
          echo "CONFIG_TARGET_mpc85xx_p1020=y" >> .config
          echo "CONFIG_TARGET_mpc85xx_p1020_DEVICE_watchguard_firebox-t30=y" >> .config
          echo "CONFIG_TARGET_ROOTFS_SQUASHFS=y" >> .config
          echo "CONFIG_TARGET_IMAGES_GZIP=y" >> .config
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=500" >> .config

          {
            echo "CONFIG_PACKAGE_luci=y"
            echo "CONFIG_PACKAGE_luci-ssl=y"
            echo "CONFIG_PACKAGE_luci-i18n-base-el=y"
            echo "CONFIG_PACKAGE_kmod-usb-storage=y"
            echo "CONFIG_PACKAGE_kmod-fs-ext4=y"
          } >> .config

          make defconfig
          export FORCE_UNSAFE_CONFIGURE=1
          make -j$(nproc) V=s

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: WatchGuard-T30-Lite-SD
          path: bin/targets/mpc85xx/p1020/
