name: Build WatchGuard T30 - SDK RAPID

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: 'dmascord/openwrt'
          ref: 'add-watchguard-t30-w'

      - name: Download OpenWrt SDK
        run: |
          # Κατεβάζουμε το επίσημο SDK για τον επεξεργαστή P1020 (PowerPC)
          wget https://downloads.openwrt.org/releases/23.05.0/targets/mpc85xx/p1020/openwrt-sdk-23.05.0-mpc85xx-p1020_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          tar xf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-* sdk

      - name: Inject T30 Support into SDK
        run: |
          # Αντιγράφουμε τα αρχεία του dmascord μέσα στο έτοιμο SDK
          cp -r target/linux/mpc85xx/files/* sdk/target/linux/mpc85xx/files/ 2>/dev/null || true
          cp target/linux/mpc85xx/image/p1020.mk sdk/target/linux/mpc85xx/image/ 2>/dev/null || true
          
          # Διορθώνουμε το p1020.mk για να βγάλει SD Image
          printf "include \$(INCLUDE_DIR)/image.mk\n\n" > sdk/target/linux/mpc85xx/image/p1020.mk
          cat <<'EOF' >> sdk/target/linux/mpc85xx/image/p1020.mk
          define Device/watchguard_firebox-t30
            DEVICE_VENDOR := WatchGuard
            DEVICE_MODEL := Firebox T30
            DEVICE_VARIANT := T30-W
            BOARD_NAME := watchguard,firebox-t30
            DEVICE_DTS := watchguard-firebox-t30
            KERNEL := append-dtb | pad-to 64k | lzma
            DEVICE_PACKAGES := kmod-usb-storage kmod-fs-ext4
            IMAGES := factory.img.gz
            IMAGE/factory.img.gz := append-kernel | pad-to 128k | append-rootfs | pad-rootfs | check-size
          endef
          TARGET_DEVICES += watchguard_firebox-t30
          $(eval $(call BuildImage))
          EOF

      - name: Rapid Image Generation
        run: |
          cd sdk
          make defconfig
          # Ζητάμε ΜΟΝΟ την παραγωγή του image για τη συγκεκριμένη συσκευή
          make target/linux/install-images SET_RETURN_CODE=1 V=s

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: WatchGuard-T30-SDK-Image
          path: sdk/bin/targets/mpc85xx/p1020/
