name: Build WatchGuard T30 - P1020 Corrected

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: 'dmascord/openwrt'
          ref: 'add-watchguard-t30-w'

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev swig \
            python3-dev python3-setuptools

      - name: Update and Install Feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure and Build
        run: |
          # Εδώ είναι η διόρθωση της αναντιστοιχίας: p1020 αντί για p1010
          printf 'CONFIG_TARGET_mpc85xx=y\n\
          CONFIG_TARGET_mpc85xx_p1020=y\n\
          CONFIG_TARGET_mpc85xx_p1020_DEVICE_watchguard_firebox-t30=y\n\
          CONFIG_PACKAGE_luci=y\n\
          CONFIG_PACKAGE_luci-ssl=y\n\
          CONFIG_PACKAGE_luci-i18n-base-el=y\n\
          CONFIG_PACKAGE_luci-i18n-firewall-el=y\n\
          CONFIG_PACKAGE_luci-app-wireguard=y\n\
          CONFIG_PACKAGE_kmod-wireguard=y\n\
          CONFIG_PACKAGE_luci-app-pbr=y\n\
          CONFIG_PACKAGE_luci-app-openvpn=y\n\
          CONFIG_PACKAGE_luci-app-sqm=y\n\
          CONFIG_PACKAGE_luci-app-statistics=y\n\
          CONFIG_PACKAGE_luci-app-diskman=y\n\
          CONFIG_PACKAGE_kmod-usb-storage=y\n\
          CONFIG_PACKAGE_kmod-fs-ext4=y\n\
          CONFIG_PACKAGE_htop=y\n\
          CONFIG_PACKAGE_curl=y\n\
          CONFIG_TARGET_ROOTFS_PARTSIZE=7500' > .config
          
          make defconfig
          export FORCE_UNSAFE_CONFIGURE=1
          # Χρήση j2 για σταθερότητα και ταχύτητα
          make -j$(nproc) V=s

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: WatchGuard-T30-P1020-Final
          path: bin/targets/mpc85xx/p1020/
