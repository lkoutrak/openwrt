name: Build WatchGuard T30
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: 'add-watchguard-t30-w'

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev swig \
            python3-dev python3-setuptools

      - name: Update and Install Feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure and Build
        run: |
          printf 'CONFIG_TARGET_mpc85xx=y\nCONFIG_TARGET_mpc85xx_p1010=y\nCONFIG_TARGET_mpc85xx_p1010_DEVICE_watchguard_firebox-t30=y\nCONFIG_PACKAGE_luci=y\nCONFIG_PACKAGE_luci-ssl=y\nCONFIG_PACKAGE_openssh-server=y\n' > .config
          make defconfig
          export FORCE_UNSAFE_CONFIGURE=1
          make -j$(nproc) V=s

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenWRT-T30-Firmware
          path: bin/targets/mpc85xx/p1010/*
