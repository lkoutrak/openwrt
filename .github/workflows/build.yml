name: WatchGuard T30 - P1020 DEFINITIVE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: 'dmascord/openwrt'
          ref: 'add-watchguard-t30-w'

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev swig \
            python3-dev python3-setuptools device-tree-compiler

      - name: Update and Install Feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Force Device Registration
        run: |
          # Διορθώνουμε το Makefile της αρχιτεκτονικής P1020 για να περιλαμβάνει το T30
          mkdir -p target/linux/mpc85xx/image/
          cat <<'EOF' > target/linux/mpc85xx/image/p1020.mk
          include $(INCLUDE_DIR)/image.mk

          define Device/watchguard_firebox-t30
            DEVICE_VENDOR := WatchGuard
            DEVICE_MODEL := Firebox T30
            BOARD_NAME := watchguard,firebox-t30
            DEVICE_DTS := watchguard-firebox-t30
            KERNEL := append-dtb | pad-to 64k | lzma
            IMAGES := factory.img.gz
            IMAGE/factory.img.gz := append-kernel | pad-to 128k | append-rootfs | pad-rootfs | check-size
          endef
          TARGET_DEVICES += watchguard_firebox-t30

          $(eval $(call BuildImage))
          EOF

      - name: Configure and Fast Build
        run: |
          # Χρήση του CONFIG-οδηγού σου αλλά για P1020
          printf 'CONFIG_TARGET_mpc85xx=y\n\
          CONFIG_TARGET_mpc85xx_p1020=y\n\
          CONFIG_TARGET_mpc85xx_p1020_DEVICE_watchguard_firebox-t30=y\n\
          CONFIG_TARGET_ROOTFS_SQUASHFS=y\n\
          CONFIG_TARGET_IMAGES_GZIP=y\n\
          CONFIG_PACKAGE_luci=y\n\
          CONFIG_PACKAGE_luci-ssl=y' > .config
          
          make defconfig
          export FORCE_UNSAFE_CONFIGURE=1
          # Χτίζουμε ΜΟΝΟ τα απαραίτητα για το image για να προλάβουμε το χρόνο
          make target/linux/install -j$(nproc) V=s
          make target/image/install -j$(nproc) V=s

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: WatchGuard-T30-P1020-REPAIRED
          path: bin/targets/mpc85xx/p1020/
