name: WatchGuard T30 - P1020 SUCCESS STRATEGY

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Official OpenWrt
        uses: actions/checkout@v4
        with:
          repository: 'openwrt/openwrt'
          ref: 'v23.05.0' # Χρησιμοποιούμε σταθερή έκδοση

      - name: Fetch T30 DTS from dmascord
        run: |
          # Παίρνουμε ΜΟΝΟ το αρχείο που περιγράφει το hardware, τίποτα άλλο προβληματικό
          mkdir -p target/linux/mpc85xx/files/arch/powerpc/boot/dts/
          wget https://raw.githubusercontent.com/dmascord/openwrt/add-watchguard-t30-w/target/linux/mpc85xx/files/arch/powerpc/boot/dts/watchguard-firebox-t30.dts \
            -O target/linux/mpc85xx/files/arch/powerpc/boot/dts/watchguard-firebox-t30.dts

      - name: Create Clean Image Recipe
        run: |
          # Φτιάχνουμε το Makefile από το μηδέν για να μην έχουμε τα Error 2 της 1000012642.jpg
          printf "include \$(INCLUDE_DIR)/image.mk\n\n" > target/linux/mpc85xx/image/p1020.mk
          cat <<'EOF' >> target/linux/mpc85xx/image/p1020.mk
          define Device/watchguard_firebox-t30
            DEVICE_VENDOR := WatchGuard
            DEVICE_MODEL := Firebox T30
            BOARD_NAME := watchguard,firebox-t30
            DEVICE_DTS := watchguard-firebox-t30
            KERNEL := append-dtb | pad-to 64k | lzma
            IMAGES := factory.img.gz
            IMAGE/factory.img.gz := append-kernel | pad-to 128k | append-rootfs | pad-rootfs | check-size
          endef
          TARGET_DEVICES += watchguard_firebox-t30
          $(eval $(call BuildImage))
          EOF

      - name: Configure and Build
        run: |
          # Εγκατάσταση απαραίτητων εργαλείων
          sudo apt update && sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev swig device-tree-compiler
          
          ./scripts/feeds update -a && ./scripts/feeds install -a
          
          echo "CONFIG_TARGET_mpc85xx=y" > .config
          echo "CONFIG_TARGET_mpc85xx_p1020=y" >> .config
          echo "CONFIG_TARGET_mpc85xx_p1020_DEVICE_watchguard_firebox-t30=y" >> .config
          echo "CONFIG_PACKAGE_luci=y" >> .config
          
          make defconfig
          export FORCE_UNSAFE_CONFIGURE=1
          # Χτίζουμε ΜΟΝΟ το target για να πάρουμε το image
          make target/linux/install -j$(nproc) V=s

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: WatchGuard-T30-Final-Image
          path: bin/targets/mpc85xx/p1020/
