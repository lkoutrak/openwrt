name: Build WatchGuard T30 - P1020 FINAL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04  # ΚΡΙΣΙΜΟ: Επιστροφή στην έκδοση που παίζει "αέρα"
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: 'master'

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev swig \
            python3-dev python3-setuptools python3 python-is-python3

      - name: Fix Python Link
        run: |
          sudo ln -sf /usr/bin/python3 /usr/bin/python
          python --version

      - name: Update and Install Feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Make scripts executable
        run: chmod +x scripts/make_watchguard_t30w_*.sh

      - name: Configure and Build
        run: |
          printf 'CONFIG_TARGET_mpc85xx=y\n\
          CONFIG_TARGET_mpc85xx_p1020=y\n\
          CONFIG_TARGET_mpc85xx_p1020_DEVICE_watchguard_firebox-t30=y\n\
          CONFIG_PACKAGE_luci=y\n\
          CONFIG_PACKAGE_luci-ssl=y\n\
          CONFIG_PACKAGE_luci-i18n-base-el=y\n\
          CONFIG_PACKAGE_luci-i18n-firewall-el=y\n\
          CONFIG_PACKAGE_luci-app-wireguard=y\n\
          CONFIG_PACKAGE_kmod-wireguard=y\n\
          CONFIG_PACKAGE_luci-app-pbr=y\n\
          CONFIG_PACKAGE_luci-app-openvpn=y\n\
          CONFIG_PACKAGE_luci-app-adblock=y\n\
          CONFIG_PACKAGE_luci-i18n-adblock-el=y\n\
          CONFIG_PACKAGE_luci-app-https-dns-proxy=y\n\
          CONFIG_PACKAGE_bind-client=y\n\
          CONFIG_PACKAGE_luci-app-timecontrol=y\n\
          CONFIG_PACKAGE_luci-app-access-control=y\n\
          CONFIG_PACKAGE_luci-app-sqm=y\n\
          CONFIG_PACKAGE_luci-i18n-sqm-el=y\n\
          CONFIG_PACKAGE_luci-app-banip=y\n\
          CONFIG_PACKAGE_luci-app-unbound=y\n\
          CONFIG_PACKAGE_netdata=y\n\
          CONFIG_PACKAGE_luci-app-nlbwmon=y\n\
          CONFIG_PACKAGE_luci-app-statistics=y\n\
          CONFIG_PACKAGE_luci-i18n-statistics-el=y\n\
          CONFIG_PACKAGE_collectd-mod-cpu=y\n\
          CONFIG_PACKAGE_collectd-mod-interface=y\n\
          CONFIG_PACKAGE_collectd-mod-memory=y\n\
          CONFIG_PACKAGE_collectd-mod-ping=y\n\
          CONFIG_PACKAGE_avahi-dbus-daemon=y\n\
          CONFIG_PACKAGE_luci-app-vlan-viz=y\n\
          CONFIG_PACKAGE_luci-app-upnp=y\n\
          CONFIG_PACKAGE_luci-app-attendedsysupgrade=y\n\
          CONFIG_PACKAGE_luci-app-diskman=y\n\
          CONFIG_PACKAGE_kmod-usb-storage=y\n\
          CONFIG_PACKAGE_kmod-fs-ext4=y\n\
          CONFIG_PACKAGE_parted=y\n\
          CONFIG_PACKAGE_resize2fs=y\n\
          CONFIG_PACKAGE_e2fsprogs=y\n\
          CONFIG_PACKAGE_htop=y\n\
          CONFIG_PACKAGE_nano=y\n\
          CONFIG_PACKAGE_bash=y\n\
          CONFIG_PACKAGE_curl=y\n\
          CONFIG_PACKAGE_ttyd=y\n\
          CONFIG_PACKAGE_luci-app-ttyd=y\n\
          CONFIG_TARGET_ROOTFS_PARTSIZE=7500' > .config

          make defconfig
          export FORCE_UNSAFE_CONFIGURE=1
          make -j$(nproc) V=s

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WatchGuard-T30-P1020-Final-Firmware
          path: bin/targets/mpc85xx/p1020/*
